<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚂 节日特快 · 白白铁路局</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --sky1:#2b1d5c; --sky2:#7a4e8f; --land:#1c1440; --glow:#ffd97a;
    --paper:#fdf8ec; --ink:#3a3328; --red:#e05d4b; --teal:#2ec4b6;
  }
  body{
    font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    min-height:100vh; color:#fff; overflow-x:hidden;
    background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 62%,var(--land) 62.2%);
    transition:background 1.2s ease;
  }
  /* ===== 天空装饰 ===== */
  .celestial{position:fixed;top:9vh;right:10vw;font-size:64px;z-index:0;
    filter:drop-shadow(0 0 28px var(--glow));transition:all 1.2s ease;pointer-events:none}
  .cloud{position:fixed;font-size:42px;opacity:.5;z-index:0;pointer-events:none;animation:drift linear infinite}
  @keyframes drift{from{transform:translateX(-15vw)}to{transform:translateX(115vw)}}
  .star{position:fixed;border-radius:50%;background:#fff;pointer-events:none;z-index:0;animation:tw 3s infinite}
  @keyframes tw{0%,100%{opacity:.1}50%{opacity:.7}}

  header{text-align:center;padding:42px 16px 10px;position:relative;z-index:2}
  .badge{display:inline-block;font-size:12px;letter-spacing:6px;border:1px solid rgba(255,255,255,.45);
    padding:5px 18px 5px 24px;border-radius:999px;color:rgba(255,255,255,.85);margin-bottom:14px}
  h1{font-size:clamp(26px,5vw,44px);letter-spacing:3px;text-shadow:0 4px 18px rgba(0,0,0,.35)}
  h1 .gold{color:var(--glow)}
  .sub{margin-top:10px;color:rgba(255,255,255,.75);font-size:14px;line-height:1.8}
  /* 白白号铭牌（点火车头的彩蛋） */
  .nameplate{position:absolute;top:48px;left:50%;transform:scaleX(-1) translateX(50%);
    background:linear-gradient(180deg,#d9b75c,#a8862f);color:#fffbe8;font-size:10px;
    letter-spacing:5px;padding:3px 10px 3px 15px;border-radius:3px;white-space:nowrap;
    box-shadow:0 2px 6px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.5);
    font-family:"STKaiti","KaiTi",serif;pointer-events:none;
    animation:plate 2s ease forwards}
  @keyframes plate{0%{opacity:0;margin-top:-6px}12%{opacity:1;margin-top:0}80%{opacity:1}100%{opacity:0}}
  .toot{position:absolute;top:-18px;left:8px;font-size:12px;color:rgba(255,255,255,.9);
    transform:scaleX(-1);pointer-events:none;animation:tootup 1.2s ease forwards;letter-spacing:2px}
  @keyframes tootup{0%{opacity:0;translate:0 6px}25%{opacity:1}100%{opacity:0;translate:0 -22px}}

  /* ===== 铁路 ===== */
  .railzone{position:relative;z-index:2;max-width:980px;margin:30px auto 0;padding:54px 28px 10px}
  .track{position:relative;height:6px;border-radius:3px;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.85) 0 14px,rgba(255,255,255,.25) 14px 24px)}
  .train{position:absolute;top:-46px;left:0;font-size:42px;transition:left 1.1s cubic-bezier(.45,.05,.35,1);
    transform:scaleX(-1);z-index:5;filter:drop-shadow(0 6px 10px rgba(0,0,0,.4))}
  .train .puff{position:absolute;left:34px;top:-6px;font-size:16px;opacity:0;transform:scaleX(-1)}
  .train.moving .puff{animation:puff 1s infinite}
  .train .puff:nth-child(2){animation-delay:.33s}.train .puff:nth-child(3){animation-delay:.66s}
  @keyframes puff{0%{opacity:.9;transform:scaleX(-1) translate(0,0) scale(.5)}100%{opacity:0;transform:scaleX(-1) translate(26px,-26px) scale(1.5)}}
  .train.moving{animation:chug .35s infinite}
  @keyframes chug{0%,100%{margin-top:0}50%{margin-top:-2px}}

  .stations{display:flex;justify-content:space-between;margin-top:-9px;position:relative}
  .station{flex:1;text-align:center;cursor:pointer;position:relative;padding-top:18px;
    transition:transform .25s;user-select:none}
  .station:hover{transform:translateY(-3px)}
  .dot{width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid rgba(0,0,0,.25);
    margin:0 auto;transition:all .3s;box-shadow:0 0 0 0 rgba(255,217,122,.5)}
  .station.active .dot{background:var(--glow);transform:scale(1.5);box-shadow:0 0 0 9px rgba(255,217,122,.22)}
  .s-emoji{font-size:24px;margin-top:9px;transition:transform .3s}
  .station.active .s-emoji{transform:scale(1.35)}
  .s-date{font-size:13px;font-weight:700;margin-top:3px;color:rgba(255,255,255,.95)}
  .s-week{font-size:11px;color:rgba(255,255,255,.6)}
  .station.today .s-date::after{content:"今天";font-size:9px;background:var(--red);border-radius:99px;
    padding:1px 6px;margin-left:4px;vertical-align:2px}
  /* 终点彩蛋站 */
  .station.teaser{opacity:.65}
  .station.teaser .dot{background:transparent;border:2px dashed rgba(255,255,255,.7)}

  .controls{display:flex;justify-content:center;gap:12px;margin:26px 0 8px;position:relative;z-index:2}
  .btn{background:rgba(255,255,255,.12);backdrop-filter:blur(6px);color:#fff;
    border:1px solid rgba(255,255,255,.35);padding:10px 22px;border-radius:999px;
    font-size:14px;cursor:pointer;font-weight:700;transition:all .2s}
  .btn:hover{background:rgba(255,255,255,.25);transform:translateY(-2px)}
  .btn.go{background:linear-gradient(135deg,#e05d4b,#f0915e);border:none;box-shadow:0 6px 18px rgba(224,93,75,.45)}

  /* ===== 站台信息板 ===== */
  .dayboard{text-align:center;margin:14px auto 4px;position:relative;z-index:2;min-height:58px}
  .dayboard .city{font-size:13px;letter-spacing:4px;color:var(--glow)}
  .dayboard h2{font-size:24px;margin-top:4px;text-shadow:0 3px 10px rgba(0,0,0,.4)}

  /* ===== 明信片 ===== */
  .cards{max-width:1060px;margin:18px auto 70px;padding:0 18px;position:relative;z-index:2;
    display:flex;flex-wrap:wrap;justify-content:center;gap:26px}
  .card{width:300px;perspective:1300px;cursor:pointer;opacity:0;transform:translateY(26px)}
  .card.in{opacity:1;transform:translateY(0) rotate(var(--tilt));transition:opacity .5s,transform .5s}
  .card:hover{z-index:4}
  .cin{position:relative;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,.2,.2,1);min-height:218px}
  .card.flip .cin{transform:rotateY(180deg)}
  .f{backface-visibility:hidden;position:absolute;inset:0;border-radius:10px;background:var(--paper);
    color:var(--ink);box-shadow:0 12px 28px rgba(0,0,0,.45);padding:18px 18px 14px;overflow:hidden}
  .f.front{position:relative;display:flex;flex-direction:column}
  .f.back{transform:rotateY(180deg);display:flex;flex-direction:column;justify-content:center;
    background:linear-gradient(160deg,#fdf8ec,#f7ead2)}
  /* 和纸胶带 */
  .tape{position:absolute;top:-9px;left:50%;transform:translateX(-50%) rotate(-2deg);width:92px;height:22px;
    background:rgba(46,196,182,.55);box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .card:nth-child(2n) .tape{background:rgba(224,93,75,.5);transform:translateX(-50%) rotate(2deg)}
  .card:nth-child(3n) .tape{background:rgba(245,197,67,.55)}
  /* 邮票 + 邮戳 */
  .corner{display:flex;justify-content:flex-end;align-items:flex-start;gap:8px;margin-bottom:2px}
  .postmark{width:52px;height:52px;border:2px solid rgba(58,51,40,.35);border-radius:50%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8.5px;
    color:rgba(58,51,40,.55);transform:rotate(-12deg);letter-spacing:1px;flex:0 0 auto}
  .stampbox{width:46px;height:56px;border:2px dashed rgba(58,51,40,.4);border-radius:4px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    font-size:24px;flex:0 0 auto;
    background:repeating-linear-gradient(45deg,rgba(0,0,0,.02) 0 5px,transparent 5px 10px)}
  .stampbox i{font-style:normal;font-size:7px;letter-spacing:2px;color:rgba(58,51,40,.45)}
  .sig{position:absolute;left:18px;bottom:12px;font-family:"STKaiti","KaiTi",serif;
    font-size:12.5px;color:rgba(58,51,40,.5);transform:rotate(-2deg);letter-spacing:1px}
  .where{font-size:11px;color:#9a8f76;letter-spacing:2px;margin-bottom:5px}
  .card h3{font-size:18px;line-height:1.4;margin-bottom:7px}
  .card h3 small{display:block;font-weight:400;font-size:11px;color:#9a8f76;margin-top:2px}
  .card p{font-size:13.5px;line-height:1.75;color:#5b5342}
  .flipnote{margin-top:auto;padding-top:9px;font-size:10.5px;color:#b3a88c;text-align:right}
  .f.back h4{color:var(--red);font-size:14px;margin-bottom:9px;letter-spacing:1px}
  .f.back p{font-size:13.5px;line-height:1.85}
  .wax{position:absolute;right:14px;bottom:12px;font-size:24px;transform:rotate(10deg);opacity:.85}

  footer{text-align:center;padding:10px 20px 56px;color:rgba(255,255,255,.5);font-size:12px;line-height:2;position:relative;z-index:2}
  footer a{color:rgba(255,255,255,.7)}

  .confetti{position:fixed;top:-12px;z-index:99;pointer-events:none;animation:drop linear forwards}
  @keyframes drop{to{transform:translateY(108vh) rotate(720deg)}}

  @media (max-width:640px){
    .s-week{display:none}
    .s-emoji{font-size:18px}
    .s-date{font-size:10px}
    .railzone{padding:54px 10px 10px}
    .card{width:88%}
  }
</style>
</head>
<body>

<div class="celestial" id="celestial">🌅</div>

<header>
  <div class="badge">FESTIVAL EXPRESS · 7 DAYS</div>
  <h1>🚂 节日<span class="gold">特快</span> · 七日环球开行</h1>
  <div class="sub">2026.06.11 — 06.17 · 点击站点发车，列车开到哪天，就看哪天的节日明信片<br>明信片可以翻面 ✉️ 背面盖着冷知识邮戳</div>
</header>

<div class="railzone">
  <div class="track">
    <div class="train" id="train">🚂<span class="puff">💨</span><span class="puff">💨</span><span class="puff">💨</span></div>
  </div>
  <div class="stations" id="stations"></div>
</div>

<div class="controls">
  <button class="btn" onclick="go(cur-1)">⬅ 前一天</button>
  <button class="btn go" id="tourBtn" onclick="toggleTour()">▶ 自动巡游</button>
  <button class="btn" onclick="go(cur+1)">后一天 ➡</button>
</div>

<div class="dayboard" id="dayboard"></div>
<div class="cards" id="cards"></div>

<footer>
  数据来源：联合国国际日 / National Day Calendar / Days of the Year / timeanddate<br>
  白白铁路局 全线运营 · 明信片经由白白邮政寄出 · 下一站，好心情
</footer>

  { d:"6.16", w:"周二", icon:"📖", city:"都柏林 · 索韦托", title:"青年与小说之日",
    theme:{s1:"#3a1d5c",s2:"#6a5db3",land:"#170f33",glow:"#b8a4ff",cel:"🌆"},
    fests:[
      {e:"📖",where:"爱尔兰 🇮🇪",n:"布鲁姆日",en:"Bloomsday",
       p:"全世界最奇特的文学节：书迷穿上爱德华时代服装，沿《尤利西斯》主角布鲁姆的路线重走都柏林，吃他吃过的早餐。",
       b:"乔伊斯的千页巨著《尤利西斯》全部情节只发生在 1904 年 6 月 16 日这一天——因为那是他和未来妻子诺拉第一次约会的日子。一次约会，纪念了一百多年。",seal:"📚"},

      {e:"💸",where:"联合国 🇺🇳",n:"家庭汇款国际日",en:"Day of Family Remittances",
       p:"致敬全球 2 亿多打工人——他们寄回家的钱，养活着全球八分之一的人口。",
       b:"全球家庭汇款总额每年超过 8000 亿美元,是国际援助总额的三倍以上。平均每笔只有 200~300 美元,却是无数家庭的全部底气。",seal:"🏠"}
    ]},
  { d:"6.17", w:"周三", icon:"🇮🇸", city:"雷克雅未克", title:"极昼里的国庆",
    theme:{s1:"#0f2b4d",s2:"#3e7cb8",land:"#0a1c33",glow:"#a4d8ff",cel:"🌞"},
    fests:[
      {e:"🇮🇸",where:"冰岛",n:"冰岛国庆日",en:"Þjóðhátíðardagurinn",
       p:"纪念 1944 年脱离丹麦成立共和国。此时冰岛接近极昼，太阳几乎不落山——大概是全世界白天最长的国庆节。",

/* 彩蛋站 */
const teaser = { d:"6.19", w:"周五", icon:"🐉", name:"端午节" };

/* ======= 渲染站点 ======= */
const stationsEl = document.getElementById("stations");
days.forEach((day,i)=>{
  const s=document.createElement("div");
  s.className="station"+(i===0?" today":"");
  s.innerHTML=`<div class="dot"></div><div class="s-emoji">${day.icon}</div>
    <div class="s-date">${day.d}</div><div class="s-week">${day.w}</div>`;
  s.onclick=()=>go(i);
  stationsEl.appendChild(s);
});
/* 终点彩蛋 */
const tz=document.createElement("div");
tz.className="station teaser";
tz.innerHTML=`<div class="dot"></div><div class="s-emoji">${teaser.icon}</div>
  <div class="s-date">${teaser.d}</div><div class="s-week">即将到站·${teaser.name}</div>`;
tz.onclick=()=>{ alert("🐉 嘟——端午节专列 6 月 19 日发车！\n粽子和龙舟已在终点站等候。"); };
stationsEl.appendChild(tz);

/* ======= 切换逻辑 ======= */
let cur=-1, touring=false, tourTimer=null;
const train=document.getElementById("train");
const cardsEl=document.getElementById("cards");
const board=document.getElementById("dayboard");
const root=document.documentElement;

function go(i){
  if(i<0||i>=days.length||i===cur) return;
  cur=i;
  const day=days[i];
  /* 火车开动 */
  const stops=document.querySelectorAll(".station");
  stops.forEach((s,k)=>s.classList.toggle("active",k===i));
  const target=stops[i];
  const zone=document.querySelector(".railzone");
  const left=target.getBoundingClientRect().left - zone.getBoundingClientRect().left
             + target.offsetWidth/2 - 49;
  train.classList.add("moving");
  train.style.left=left+"px";
  setTimeout(()=>train.classList.remove("moving"),1150);

  /* 换天色 */
  root.style.setProperty("--sky1",day.theme.s1);
  root.style.setProperty("--sky2",day.theme.s2);
  root.style.setProperty("--land",day.theme.land);
  root.style.setProperty("--glow",day.theme.glow);
  document.body.style.background=
    `linear-gradient(180deg,${day.theme.s1} 0%,${day.theme.s2} 62%,${day.theme.land} 62.2%)`;
  document.getElementById("celestial").textContent=day.theme.cel;

  /* 信息板 */
  board.innerHTML=`<div class="city">${day.city}</div><h2>${day.d} ${day.w} · ${day.title}</h2>`;

  /* 明信片 */
  cardsEl.innerHTML="";
  day.fests.forEach((f,k)=>{
    const c=document.createElement("div");
    c.className="card";
    c.style.setProperty("--tilt",(k%2? "1.2deg":"-1.2deg"));
    c.innerHTML=`<div class="cin">
      <div class="f front">
        <div class="tape"></div>
        <div class="corner">
          <div class="postmark">白白邮政<br>2026<br>${day.d}</div>
          <div class="stampbox">${f.e}<i>白白邮政</i></div>
        </div>
        <div class="where">FROM · ${f.where}</div>
        <h3>${f.n}<small>${f.en}</small></h3>
        <p>${f.p}</p>
        <div class="flipnote">翻面看冷知识 ↻</div>
      </div>
      <div class="f back">
        <h4>📮 冷知识 · ${f.n}</h4>
        <p>${f.b}</p>
        <div class="sig">—— 白白 寄</div>
        <div class="wax">${f.seal}</div>
      </div>
    </div>`;
    c.onclick=()=>{ c.classList.toggle("flip"); if(c.classList.contains("flip")) confetti(c); };
    cardsEl.appendChild(c);
    setTimeout(()=>c.classList.add("in"),140*k+1000);
  });
}

/* 自动巡游 */
function toggleTour(){
  touring=!touring;
  document.getElementById("tourBtn").textContent = touring?"⏸ 暂停巡游":"▶ 自动巡游";
  if(touring){
    if(cur>=days.length-1) go(0);
    tourTimer=setInterval(()=>{
      if(cur>=days.length-1){ toggleTour(); return; }
      go(cur+1);
    },5200);
  } else clearInterval(tourTimer);
}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") go(cur+1);
  if(e.key==="ArrowLeft") go(cur-1);
});

/* 彩带 */
const colors=["#e05d4b","#f5c543","#2ec4b6","#9b5de5","#f0915e","#4cc9f0"];
function confetti(near){
  const r=near.getBoundingClientRect();
  for(let i=0;i<24;i++){
    const p=document.createElement("div");
    p.className="confetti";
    const s=5+Math.random()*8;
    p.style.cssText=`left:${r.left+Math.random()*r.width}px;top:${r.top}px;width:${s}px;height:${s*.55}px;
      background:${colors[Math.random()*colors.length|0]};border-radius:2px;
      animation-duration:${1.3+Math.random()*1.6}s;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3200);
  }
}

/* 云与星 */
for(let i=0;i<4;i++){
  const c=document.createElement("div");
  c.className="cloud"; c.textContent="☁️";
  c.style.cssText=`top:${4+Math.random()*22}vh;font-size:${26+Math.random()*30}px;
    animation-duration:${55+Math.random()*50}s;animation-delay:-${Math.random()*60}s;`;
  document.body.appendChild(c);
}
for(let i=0;i<46;i++){
  const s=document.createElement("div");
  s.className="star";
  const z=1+Math.random()*2;
  s.style.cssText=`left:${Math.random()*100}vw;top:${Math.random()*45}vh;width:${z}px;height:${z}px;animation-delay:${Math.random()*3}s;`;
  document.body.appendChild(s);
}

/* 彩蛋：点火车头，亮出「白白号」黄铜铭牌 */
train.style.cursor="pointer";
train.addEventListener("click",e=>{
  e.stopPropagation();
  train.querySelectorAll(".nameplate,.toot").forEach(n=>n.remove());
  const plate=document.createElement("div");
  plate.className="nameplate"; plate.textContent="白 白 号";
  const toot=document.createElement("div");
  toot.className="toot"; toot.textContent="嘟——";
  train.append(plate,toot);
  setTimeout(()=>{plate.remove();toot.remove();},2100);
});

/* 发车！ */
go(0);
</script>
</body>
</html>
